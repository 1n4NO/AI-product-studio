name: Nightly E2E

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  smoke-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3000/api
      AUTH_COOKIE_SECRET: ci-auth-cookie-secret
      INTERNAL_API_KEY: ci-internal-api-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Studio Smoke E2E
        run: npm run --workspace @product-studio/studio-web test:smoke

      - name: Upload Playwright Report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/studio-web/playwright-report
            apps/studio-web/test-results
          if-no-files-found: ignore
