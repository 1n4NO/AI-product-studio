name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Test Runtime Contracts
        run: npm run --workspace @product-studio/agent-runtime test

      - name: Test Studio Smoke E2E
        run: npm run --workspace @product-studio/studio-web test:smoke

      - name: Build
        run: npm run build
