name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3000/api
      AUTH_COOKIE_SECRET: ci-auth-cookie-secret
      INTERNAL_API_KEY: ci-internal-api-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Test Runtime Contracts
        run: npm run --workspace @product-studio/agent-runtime test

      - name: Test Audit Gates
        run: npm run --workspace @product-studio/ux-audit test

      - name: Test Studio Smoke E2E
        run: npm run --workspace @product-studio/studio-web test:smoke

      - name: Build
        run: npm run build
