name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        run: npm run typecheck && npm run build

      - name: Deploy placeholder
        run: |
          echo "Deploying commit ${GITHUB_SHA} to ${{ inputs.environment }}"
          echo "Replace this step with your platform deploy command (Vercel/AWS/etc)."

      - name: Post-deploy health check
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          if [ -z "${HEALTHCHECK_URL}" ] && [ -n "${APP_BASE_URL}" ]; then
            HEALTHCHECK_URL="${APP_BASE_URL%/}/api/health"
          fi
          if [ -z "${HEALTHCHECK_URL}" ]; then
            echo "HEALTHCHECK_URL/APP_BASE_URL not configured; skipping health check."
            exit 0
          fi
          echo "Checking ${HEALTHCHECK_URL}"
          curl --fail --show-error --silent "${HEALTHCHECK_URL}" > /tmp/healthcheck.out
          echo "Health check passed."

      - name: Rollback placeholder on failure
        if: ${{ failure() }}
        run: |
          echo "Deployment verification failed for ${{ inputs.environment }}."
          echo "Trigger rollback to previous stable revision here."
          echo "Replace this with platform-specific rollback command."
